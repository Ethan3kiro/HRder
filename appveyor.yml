version: '{build}'

image: Visual Studio 2022

environment:
  matrix:
    - PYTHON: "C:\\Python311-x64"
      PYTHON_VERSION: "3.11"
      PYTHON_ARCH: "64"

install:
  - "SET PATH=%PYTHON%;%PYTHON%\\Scripts;%PATH%"
  - python --version
  - python -m pip install --upgrade pip
  - pip install -r requirements.txt
  - pip install -r requirements-gui.txt
  - pip install pyinstaller

build_script:
  - pyinstaller --name=HarrisReader --windowed --onefile --add-data="config;config" --hidden-import=PyQt6 --hidden-import=PyQt6.QtCore --hidden-import=PyQt6.QtGui --hidden-import=PyQt6.QtWidgets --hidden-import=PyQt6.QtCharts --hidden-import=pandas --hidden-import=numpy --hidden-import=matplotlib --hidden-import=PIL --hidden-import=pytesseract --hidden-import=openpyxl --hidden-import=xlsxwriter --hidden-import=requests --hidden-import=urllib3 --hidden-import=charset_normalizer --hidden-import=certifi --hidden-import=idna --hidden-import=cv2 --collect-all PyQt6 --collect-all matplotlib --collect-all requests main_gui.py

after_build:
  - mkdir release
  - copy dist\HarrisReader.exe release\
  - copy README.md release\
  - if exist "如何使用API识别.md" copy "如何使用API识别.md" release\
  - if exist "API密钥配置快速参考.txt" copy "API密钥配置快速参考.txt" release\
  - if exist "阿里云百炼配置指南.md" copy "阿里云百炼配置指南.md" release\
  - xcopy /E /I config release\config
  - if exist examples xcopy /E /I examples release\examples
  - echo HarrisReader %APPVEYOR_REPO_TAG_NAME% > release\VERSION.txt

artifacts:
  - path: release
    name: HarrisReader-Windows-$(APPVEYOR_REPO_TAG_NAME)
    type: zip

# 不部署到 GitHub，只生成 artifacts
# 可以从 AppVeyor 项目页面下载构建产物

# 只在打标签时构建
skip_non_tags: false
