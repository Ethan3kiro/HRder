version: '{build}'

# 只在打标签时构建
skip_non_tags: true

# 构建环境
image: Visual Studio 2022

# 环境变量
environment:
  matrix:
    - PYTHON: "C:\\Python311"
      PYTHON_VERSION: "3.11"
      PYTHON_ARCH: "64"

# 安装阶段
install:
  # 显示 Python 版本
  - cmd: "%PYTHON%\\python.exe --version"
  - cmd: "%PYTHON%\\python.exe -m pip --version"
  
  # 升级 pip
  - cmd: "%PYTHON%\\python.exe -m pip install --upgrade pip"
  
  # 安装依赖
  - cmd: "%PYTHON%\\python.exe -m pip install -r requirements.txt"
  - cmd: "%PYTHON%\\python.exe -m pip install -r requirements-gui.txt"
  - cmd: "%PYTHON%\\python.exe -m pip install pyinstaller"

# 构建阶段
build_script:
  # 使用 PyInstaller 打包
  - cmd: >-
      "%PYTHON%\\python.exe" -m PyInstaller
      --name=HarrisReader
      --windowed
      --onefile
      --add-data="config;config"
      --hidden-import=PyQt6
      --hidden-import=PyQt6.QtCore
      --hidden-import=PyQt6.QtGui
      --hidden-import=PyQt6.QtWidgets
      --hidden-import=PyQt6.QtCharts
      --hidden-import=pandas
      --hidden-import=numpy
      --hidden-import=matplotlib
      --hidden-import=PIL
      --hidden-import=pytesseract
      --hidden-import=openpyxl
      --hidden-import=xlsxwriter
      --hidden-import=requests
      --hidden-import=urllib3
      --hidden-import=charset_normalizer
      --hidden-import=certifi
      --hidden-import=idna
      --hidden-import=cv2
      --collect-all PyQt6
      --collect-all matplotlib
      --collect-all requests
      main_gui.py
  
  # 创建发布包
  - cmd: mkdir release
  - cmd: copy dist\HarrisReader.exe release\
  - cmd: copy README.md release\
  - cmd: copy 智谱AI配置指南.md release\
  - cmd: xcopy /E /I config release\config
  - cmd: xcopy /E /I examples release\examples
  - cmd: echo HarrisReader %APPVEYOR_REPO_TAG_NAME% > release\VERSION.txt
  
  # 创建 ZIP 压缩包
  - cmd: 7z a HarrisReader-Windows-%APPVEYOR_REPO_TAG_NAME%.zip .\release\*

# 测试阶段（可选）
test: off

# 构建产物
artifacts:
  - path: HarrisReader-Windows-*.zip
    name: HarrisReader-Windows

# 部署到 GitHub Releases
deploy:
  provider: GitHub
  auth_token:
    secure: YOUR_GITHUB_TOKEN_HERE  # 需要在 AppVeyor 设置中加密
  artifact: HarrisReader-Windows
  draft: false
  prerelease: false
  on:
    APPVEYOR_REPO_TAG: true

# 通知（可选）
notifications:
  - provider: Email
    on_build_success: false
    on_build_failure: true
    on_build_status_changed: true
