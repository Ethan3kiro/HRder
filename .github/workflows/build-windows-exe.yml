name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'  # 使用稳定版本
    
    - name: Install system dependencies
      run: |
        # 下载并安装 Tesseract OCR
        choco install tesseract -y
        echo "Tesseract installed"
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-gui.txt
        pip install pyinstaller
    
    - name: Create spec file for PyInstaller
      run: |
        # 创建 PyInstaller spec 文件
        cat > HarrisReader.spec << 'EOF'
        # -*- mode: python ; coding: utf-8 -*-
        import os

        block_cipher = None

        # 只添加存在的数据文件夹
        datas = []
        if os.path.exists('config'):
            datas.append(('config', 'config'))
        if os.path.exists('docs'):
            datas.append(('docs', 'docs'))
        
        # 添加 Tesseract OCR 可执行文件和数据文件
        # Chocolatey 安装路径
        tesseract_path = r'C:\Program Files\Tesseract-OCR'
        if os.path.exists(tesseract_path):
            # 添加 tesseract.exe
            tesseract_exe = os.path.join(tesseract_path, 'tesseract.exe')
            if os.path.exists(tesseract_exe):
                datas.append((tesseract_exe, 'tesseract'))
            
            # 添加 tessdata 文件夹（只需要 eng.traineddata）
            tessdata_path = os.path.join(tesseract_path, 'tessdata')
            if os.path.exists(tessdata_path):
                datas.append((tessdata_path, 'tesseract/tessdata'))

        a = Analysis(
            ['main_gui.py'],
            pathex=[],
            binaries=[],
            datas=datas,
            hiddenimports=[
                'PyQt6.QtCore',
                'PyQt6.QtGui',
                'PyQt6.QtWidgets',
                'PyQt6.sip',
                'PIL',
                'PIL.Image',
                'cv2',
                'numpy',
                'pandas',
                'pytesseract',
                'openpyxl',
                'xlsxwriter',
                'plotly',
                'matplotlib',
                'sqlite3',
                'json',
                'pathlib',
            ],
            hookspath=[],
            hooksconfig={},
            runtime_hooks=[],
            excludes=[],
            win_no_prefer_redirects=False,
            win_private_assemblies=False,
            cipher=block_cipher,
            noarchive=False,
        )

        pyz = PYZ(a.pure, a.zipped_data, cipher=block_cipher)

        exe = EXE(
            pyz,
            a.scripts,
            a.binaries,
            a.zipfiles,
            a.datas,
            [],
            name='HarrisReader',
            debug=False,
            bootloader_ignore_signals=False,
            strip=False,
            upx=True,
            upx_exclude=[],
            runtime_tmpdir=None,
            console=False,  # 不显示控制台窗口
            disable_windowed_traceback=False,
            argv_emulation=False,
            target_arch=None,
            codesign_identity=None,
            entitlements_file=None,
            icon=None,
        )
        EOF
      shell: bash
    
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller HarrisReader.spec --noconfirm
    
    - name: Create distribution folder
      run: |
        mkdir HarrisReader-Windows
        copy dist\HarrisReader.exe HarrisReader-Windows\
        copy README.md HarrisReader-Windows\
        
        REM 复制配置文件夹及所有配置文件到分发目录
        if exist config (
          xcopy /E /I /Y config HarrisReader-Windows\config
        )
        
        REM 创建使用说明
        echo HarrisReader - Windows 版本 > HarrisReader-Windows\使用说明.txt
        echo. >> HarrisReader-Windows\使用说明.txt
        echo 系统要求 >> HarrisReader-Windows\使用说明.txt
        echo - Windows 10 或更高版本 >> HarrisReader-Windows\使用说明.txt
        echo - 无需额外安装依赖，开箱即用 >> HarrisReader-Windows\使用说明.txt
        echo. >> HarrisReader-Windows\使用说明.txt
        echo 使用方法 >> HarrisReader-Windows\使用说明.txt
        echo 1. 解压 ZIP 文件到任意目录 >> HarrisReader-Windows\使用说明.txt
        echo 2. 双击 HarrisReader.exe 启动程序 >> HarrisReader-Windows\使用说明.txt
        echo 3. 程序已内置 Tesseract OCR 和预配置坐标模板 >> HarrisReader-Windows\使用说明.txt
        echo 4. 可直接使用模板识别功能 >> HarrisReader-Windows\使用说明.txt
        echo 5. 配置文件位于 config 文件夹中 >> HarrisReader-Windows\使用说明.txt
        echo 6. 详细文档请查看 README.md >> HarrisReader-Windows\使用说明.txt
      shell: cmd
    
    - name: Compress distribution
      run: |
        Compress-Archive -Path HarrisReader-Windows -DestinationPath HarrisReader-Windows.zip
      shell: powershell
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: HarrisReader-Windows
        path: HarrisReader-Windows.zip
        retention-days: 30
    
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: HarrisReader-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
