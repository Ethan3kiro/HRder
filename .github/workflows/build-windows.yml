name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'  # 当推送 v* 标签时触发（如 v1.0.0）
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'  # 使用 Python 3.11（稳定且兼容性好）
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-gui.txt
        pip install pyinstaller
    
    - name: Build executable with PyInstaller
      run: |
        pyinstaller --name="HarrisReader" --windowed --onefile --add-data="config;config" --hidden-import=PyQt6 --hidden-import=PyQt6.QtCore --hidden-import=PyQt6.QtGui --hidden-import=PyQt6.QtWidgets --hidden-import=PyQt6.QtCharts --hidden-import=pandas --hidden-import=numpy --hidden-import=matplotlib --hidden-import=PIL --hidden-import=pytesseract --hidden-import=openpyxl --hidden-import=xlsxwriter --hidden-import=requests --hidden-import=urllib3 --hidden-import=charset_normalizer --hidden-import=certifi --hidden-import=idna --hidden-import=cv2 --collect-all PyQt6 --collect-all matplotlib --collect-all requests main_gui.py
    
    - name: Create release package
      run: |
        mkdir release
        copy dist\HarrisReader.exe release\
        copy README.md release\
        copy "如何使用API识别.md" release\
        copy "API密钥配置快速参考.txt" release\
        xcopy /E /I config release\config
        xcopy /E /I examples release\examples
        echo "HarrisReader v${{ github.ref_name }}" > release\VERSION.txt
    
    - name: Create ZIP archive
      run: |
        powershell Compress-Archive -Path release\* -DestinationPath HarrisReader-Windows-${{ github.ref_name }}.zip
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: HarrisReader-Windows
        path: HarrisReader-Windows-*.zip
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: HarrisReader-Windows-*.zip
        body: |
          ## HarrisReader ${{ github.ref_name }}
          
          ### 📦 Windows 独立可执行文件
          
          **下载后直接运行，无需安装 Python 环境！**
          
          ### ✨ 主要功能
          - 🤖 AI 辅助识别（深度学习模型）
          - 🌐 云端 API 识别（准确率 100%）
          - ✍️ 手动数据录入
          - 📊 数据分析和可视化
          - 📈 趋势分析和对比
          - 💾 数据导出（Excel/CSV）
          
          ### 📋 使用说明
          1. 解压 ZIP 文件
          2. 运行 `HarrisReader.exe`
          3. 如需使用 API 识别，配置 `config/api_config.json`
          
          ### 📚 文档
          - [快速开始](https://github.com/${{ github.repository }}/blob/main/QUICK_START.md)
          - [API 识别指南](https://github.com/${{ github.repository }}/blob/main/如何使用API识别.md)
          - [完整文档](https://github.com/${{ github.repository }}/blob/main/README.md)
          
          ### 💡 系统要求
          - Windows 10/11 64位
          - 4GB+ 内存
          - 网络连接（API 识别功能需要）
          
          ### 🐛 问题反馈
          如有问题，请在 [Issues](https://github.com/${{ github.repository }}/issues) 中反馈
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
