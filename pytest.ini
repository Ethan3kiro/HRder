[pytest]
# pytest配置文件

# 测试路径
testpaths = tests

# 测试文件、类和函数的命名模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 命令行选项
addopts = 
    --verbose
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --strict-markers
    -ra

# 标记定义
markers =
    unit: 单元测试
    property: 基于属性的测试
    integration: 集成测试
    slow: 运行时间较长的测试

# 覆盖率配置
[coverage:run]
source = src
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
